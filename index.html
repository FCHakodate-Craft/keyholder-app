<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクリルルームキーホルダー</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#000000">

  <script src="https://cdn.jsdelivr.net/npm/opentype.js@latest/dist/opentype.min.js"></script>

<style>
  body { font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif; margin: 30px; }
  h2 { margin-bottom: 20px; white-space: pre-line; }
  .container { display:flex; gap:40px; flex-wrap:wrap; align-items:flex-start; }
  .preview-box { border:1px solid #ccc; border-radius:14px; padding:20px; }
  svg { display:block; max-width:100%; }
  .control-panel { min-width:280px; }
  input, select, button {
    width:100%; padding:10px; margin-top:8px; font-size:16px;
    border-radius:8px; border:1px solid #ccc; box-sizing:border-box;
  }
  .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }
  .btn { background:#000; color:#fff; border:none; cursor:pointer; }
  .btn2 { background:#fff; color:#000; border:1px solid #000; cursor:pointer; }
  .btnNext { background:#0a7; color:#fff; border:none; cursor:pointer; }
  .hint { font-size:12px; color:#666; margin-top:10px; line-height:1.6; }

@font-face{
  font-family: "F1_NotoSansJP";
  src: url("fonts_otf/NotoSansJP-Regular.ttf") format("truetype");
  font-display: swap;
}
@font-face{
  font-family: "F2_NotoSerifJP";
  src: url("fonts_otf/NotoSerifJP-Regular.ttf") format("truetype");
  font-display: swap;
}
@font-face{
  font-family: "F3_ZenMaruGothic";
  src: url("fonts_otf/ZenMaruGothic-Regular.ttf") format("truetype");
  font-display: swap;
}
@font-face{
  font-family: "F4_MPLUS1p";
  src: url("fonts_otf/MPLUS1p-Regular.ttf") format("truetype");
  font-display: swap;
}
  
</style>
</head>

<body>

<h2>アクリルルームキーホルダー
入力フォーム</h2>

<label>受付番号（自動）</label>
<input id="ticketInput" type="text" value="" readonly>

<div class="container">

  <!-- プレビュー -->
  <div class="preview-box">
    <svg viewBox="0 0 70 15" width="560">
      <rect x="0.8" y="0.8" width="68.4" height="13.4" rx="2.2" ry="2.2"
            fill="none" stroke="#000" stroke-width="0.6"/>
      <circle cx="3.8" cy="7.5" r="1.5"
              fill="none" stroke="#000" stroke-width="0.6"/>

      <text id="mainText" x="34" y="8"
            text-anchor="middle" dominant-baseline="middle"
            font-size="6" fill="#000">はこだてみらい館</text>

      <g transform="rotate(-90 64 7.5)">
        <text id="numText" x="64" y="7.5"
              text-anchor="middle" dominant-baseline="middle"
              font-size="4" fill="#000">1015</text>
      </g>
    </svg>
  </div>

  <!-- 入力フォーム -->
  <div class="control-panel">
    <label>メイン文字</label>
    <input id="nameInput" type="text" value="はこだてみらい館">

    <label>数字（最大4桁）</label>
    <input id="numInput" type="text" value="1015" maxlength="4" inputmode="numeric">

    <label>フォント</label>
    <select id="fontSelect">
  　　<option value="F1_NotoSansJP">Noto Sans JP</option>
  　　<option value="F2_NotoSerifJP">Noto Serif JP</option>
  　　<option value="F3_ZenMaruGothic">Zen Maru Gothic</option>
  　　<option value="F4_MPLUS1p">M PLUS 1p</option>
　　</select>

    <div class="btnRow">
      <button class="btn" id="btnDone" type="button">完了（スタッフに渡す）</button>
      <button class="btn2" id="btnEdit" type="button" style="display:none;">修正する</button>
    </div>

    <div class="hint">
      iPadは端末ごとに URL の末尾を変えてください：<br>
      <code>?device=A</code> / <code>?device=B</code> / <code>?device=C</code> / <code>?device=D</code>
    </div>
  </div>

</div>

<!-- 完了オーバーレイ（お客さま向けメッセージ＋スタッフ扉） -->
<div id="doneOverlay" style="
  position:fixed; inset:0; background:rgba(0,0,0,.55);
  display:none; align-items:center; justify-content:center; z-index:9999;
">
  <div style="
    width:min(560px, 92vw); background:#fff; border-radius:16px; padding:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
  ">
    <div style="font-size:18px; font-weight:700; margin-bottom:8px;">入力を確定しました</div>
    <div style="font-size:14px; line-height:1.6; color:#333;">
      この画面のままスタッフにお渡しください。<br>
      スタッフがデータ出力・保存を行います。
    </div>

    <div style="margin-top:12px; padding:12px; border:1px solid #eee; border-radius:12px; background:#fafafa;">
      <div style="font-size:12px; color:#666;">確定内容</div>
      <div id="doneSummary" style="font-size:16px; margin-top:6px;"></div>
    </div>

    <!-- スタッフ扉 -->
    <div style="margin-top:14px; border-top:1px dashed #ddd; padding-top:12px;">
      <button id="openStaffInOverlay" type="button"
        style="background:#fff;border:1px solid #ddd;color:#555;border-radius:10px;padding:10px;width:100%;cursor:pointer;">
        スタッフ用（出力・保存）
      </button>

      <div id="staffGate" style="display:none; margin-top:10px;">
        <label style="font-size:13px;">合言葉</label>
        <input id="staffPassOverlay" type="password" placeholder="スタッフのみ"
               style="width:100%;padding:10px;margin-top:6px;font-size:16px;border-radius:10px;border:1px solid #ccc;" />
        <button id="unlockStaffOverlay" type="button"
                style="margin-top:8px;background:#000;color:#fff;border-radius:10px;padding:10px;width:100%;border:none;cursor:pointer;">
          開く
        </button>
        <div id="staffMsgOverlay" style="margin-top:8px;font-size:12px;color:#666;"></div>

        <div id="staffControlsOverlay" style="display:none; margin-top:12px;">
          <div style="display:flex;gap:10px;flex-wrap:wrap;">
            <button class="btn" id="btnDownloadOverlay" type="button">SVGダウンロード（パス化）</button>
            <button class="btn2" id="btnDriveOverlay" type="button">Driveへ保存（パス化）</button>
          </div>

          <label style="margin-top:12px;display:block;font-size:13px;">Drive保存URL（GAS）</label>
          <input id="gasUrlOverlay" type="text" placeholder="https://script.google.com/macros/s/.../exec"
                 style="width:100%;padding:10px;margin-top:6px;font-size:16px;border-radius:10px;border:1px solid #ccc;" />

          <label style="margin-top:10px;display:block;font-size:13px;">保存キー（任意）</label>
          <input id="apiKeyOverlay" type="text" placeholder="任意（GAS側と一致）"
                 style="width:100%;padding:10px;margin-top:6px;font-size:16px;border-radius:10px;border:1px solid #ccc;" />

          <button id="resetCounterOverlay" type="button"
            style="margin-top:10px;background:#fff;border:1px solid #c33;color:#c33;border-radius:10px;padding:10px;width:100%;cursor:pointer;">
            受付番号を0にリセット（この端末のみ）
          </button>
          <div style="font-size:12px;color:#666;margin-top:6px;">
            ※合言葉でスタッフ操作を開いた状態でのみ実行できます
          </div>
        </div>
      </div>
    </div>

    <div style="display:flex; gap:10px; margin-top:16px; flex-wrap:wrap;">
      <button id="closeDone" type="button"
        style="flex:1;background:#fff;border:1px solid #ddd;color:#333;border-radius:10px;padding:10px;cursor:pointer;">
        閉じる
      </button>
      <button id="backToEdit" type="button"
        style="flex:1;background:#000;border:none;color:#fff;border-radius:10px;padding:10px;cursor:pointer;">
        修正する
      </button>
      <button id="nextPerson" type="button"
  　　　style="flex:1;background:#0a7;border:none;color:#fff;border-radius:10px;padding:10px;cursor:pointer; display:none;">
  　　　次の人へ
　　　</button>
    </div>
  </div>
</div>

<script>
(() => {
  // ===== DOM =====
  const ticketInput = document.getElementById("ticketInput");
  const nameInput   = document.getElementById("nameInput");
  const numInput    = document.getElementById("numInput");
  const fontSelect  = document.getElementById("fontSelect");
  const mainText    = document.getElementById("mainText");
  const numText     = document.getElementById("numText");

  const btnDone = document.getElementById("btnDone");
  const btnEdit = document.getElementById("btnEdit");

  const doneOverlay = document.getElementById("doneOverlay");
  const doneSummary = document.getElementById("doneSummary");
  const closeDone   = document.getElementById("closeDone");
  const backToEdit  = document.getElementById("backToEdit");
  const nextPerson  = document.getElementById("nextPerson");

  const openStaffInOverlay = document.getElementById("openStaffInOverlay");
  const staffGate     = document.getElementById("staffGate");
  const staffPass     = document.getElementById("staffPassOverlay");
  const unlockStaff   = document.getElementById("unlockStaffOverlay");
  const staffMsg      = document.getElementById("staffMsgOverlay");
  const staffControls = document.getElementById("staffControlsOverlay");

  const btnDownload = document.getElementById("btnDownloadOverlay");
  const btnDrive    = document.getElementById("btnDriveOverlay");
  const gasUrl      = document.getElementById("gasUrlOverlay");
  const apiKey      = document.getElementById("apiKeyOverlay");
  const resetCounterBtn = document.getElementById("resetCounterOverlay");

    // ===== フォント（パス化用：ttf/otf）=====
  const FONT_TABLE = {
  "F1_NotoSansJP":    { pathUrl:"fonts_otf/NotoSansJP-Regular.ttf",    previewFamily:"F1_NotoSansJP" },
  "F2_NotoSerifJP":   { pathUrl:"fonts_otf/NotoSerifJP-Regular.ttf",   previewFamily:"F2_NotoSerifJP" },
  "F3_ZenMaruGothic": { pathUrl:"fonts_otf/ZenMaruGothic-Regular.ttf", previewFamily:"F3_ZenMaruGothic" },
  "F4_MPLUS1p":       { pathUrl:"fonts_otf/MPLUS1p-Regular.ttf",       previewFamily:"F4_MPLUS1p" },
};

  const fontCache = new Map();
  async function getPathFont(fontKey){
    if (fontCache.has(fontKey)) return fontCache.get(fontKey);
    const info = FONT_TABLE[fontKey];
    if (!info) throw new Error("フォント未定義: " + fontKey);

    const res = await fetch(info.pathUrl);
    if (!res.ok) throw new Error("フォント読み込み失敗: " + info.pathUrl);

    const buf = await res.arrayBuffer();
    const font = opentype.parse(buf);
    fontCache.set(fontKey, font);
    return font;
  }

  // ===== localStorage 安全化 =====
  function safeStorage() {
    try {
      const k = "__hk_test__";
      localStorage.setItem(k, "1");
      localStorage.removeItem(k);
      return localStorage;
    } catch (e) {
      // localStorageが使えない環境でも動かす
      return {
        getItem: () => null,
        setItem: () => {},
        removeItem: () => {},
      };
    }
  }
  const store = safeStorage();

  // ===== 受付番号（端末ID + 日付タグ + 連番）=====
  const params = new URLSearchParams(location.search);
  const devicePrefix = (params.get("device") || "X").toUpperCase();

  function getEventTag() {
    const d  = new Date();
    const mm = String(d.getMonth() + 1).padStart(2, "0");
    const dd = String(d.getDate()).padStart(2, "0");
    return `${mm}${dd}`; // 例: 0328
  }
  function pad3(n){ return String(n).padStart(3, "0"); }
  function counterKey(){ return `hk_ticket_counter_v2_${getEventTag()}_${devicePrefix}`; }

  function getNextTicket() {
    const key = counterKey();
    const current = parseInt(store.getItem(key) || "0", 10);
    const next = current + 1;
    store.setItem(key, String(next));
    return next;
  }

  function setTicket(n) {
    const value = `${getEventTag()}-${devicePrefix}-${pad3(n)}`;
    if (ticketInput) ticketInput.value = value;
    return value;
  }

  // 初期番号
  try {
    setTicket(getNextTicket());
  } catch (e) {
    // 念のための保険
    const fallback = `${getEventTag()}-${devicePrefix}-001`;
    if (ticketInput) ticketInput.value = fallback;
  }

  // ===== プレビュー更新 =====
  function normalizeNumber() {
    const clean = (numInput.value || "").replace(/[^0-9]/g, "").slice(0, 4);
    numInput.value = clean;
    return clean;
  }

  function fitMainText() {
    const holeCenter = 3.8, holeRadius = 1.5; // 穴径3mm
    const holeMargin = 0.8;
    const numberArea = 6;
    const rightMargin = 2;

    const holeRight = holeCenter + holeRadius;
    const textStart = holeRight + holeMargin;
    const textEnd = 70 - numberArea - rightMargin;

    const maxWidth = Math.max(5, textEnd - textStart);
    const centerX = textStart + maxWidth / 2;

    mainText.setAttribute("x", centerX);

    let fontSize = 6;
    mainText.setAttribute("font-size", fontSize);

    requestAnimationFrame(() => {
      let bbox = mainText.getBBox();
      while (bbox.width > maxWidth && fontSize > 2) {
        fontSize -= 0.2;
        mainText.setAttribute("font-size", fontSize);
        bbox = mainText.getBBox();
      }
    });
  }

  function updatePreview() {
    mainText.textContent = nameInput.value || "";
    numText.textContent  = normalizeNumber();
    const f = fontSelect.value;
    const fam = (FONT_TABLE[f]?.previewFamily) || "sans-serif";
    mainText.setAttribute("font-family", fam);
    numText.setAttribute("font-family", fam);
    fitMainText();
  }

  nameInput.addEventListener("input", updatePreview);
  numInput.addEventListener("input", updatePreview);
  fontSelect.addEventListener("change", updatePreview);
  updatePreview();

  // ===== 完了フロー =====
  function setLocked(locked) {
    nameInput.readOnly = locked;
    numInput.readOnly = locked;
    fontSelect.disabled = locked;
    btnDone.style.display = locked ? "none" : "block";
    btnEdit.style.display = locked ? "block" : "none";
  }

  function makeSummary() {
    const name = (nameInput.value || "").trim() || "（未入力）";
    const num  = (numInput.value || "").trim() || "（なし）";
    const fontLabel = fontSelect.options[fontSelect.selectedIndex]?.textContent || "";
    const ticket = ticketInput.value || "";
    return `受付番号：${ticket}<br>文字：${name}<br>数字：${num}<br>フォント：${fontLabel}`;
  }

  function resetStaffUI() {
    staffControls.style.display = "none";
    staffGate.style.display = "none";
    staffPass.value = "";
    staffMsg.textContent = "";
    // 「次の人へ」は解錠後のみ見せる
    nextPerson.style.display = "none";
  }

  function escapeXml(s){
    return (s || "")
      .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
      .replace(/"/g,"&quot;").replace(/'/g,"&apos;");
  }

  function makeFilename(){
    const d = new Date();
    const pad = n => String(n).padStart(2,"0");
    const stamp = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    const ticket = (ticketInput.value || "X-000").replace(/[\\/:*?"<>|]/g,"");
    const name = (nameInput.value || "NONAME").replace(/[\\/:*?"<>|]/g,"").slice(0,20);
    const num = (numInput.value || "").slice(0,4);
    return `${stamp}_${ticket}_${name}_${num}.svg`;
  }

  function makeSvgShell(inner){
    // レーザー用：パスは fill #000（K100相当運用）
    return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="70mm" height="15mm" viewBox="0 0 70 15">
  <rect x="0.8" y="0.8" width="68.4" height="13.4" rx="2.2" ry="2.2" fill="none" stroke="#000" stroke-width="0.2"/>
  <circle cx="3.8" cy="7.5" r="1.5" fill="none" stroke="#000" stroke-width="0.2"/>
  ${inner}
</svg>`;
  }

  async function buildOutlinedSvg(){
  const fontKey = fontSelect.value;
  const font = await getPathFont(fontKey);

  const name = (nameInput.value || "");
  const num  = (numInput.value || "").replace(/[^0-9]/g,"").slice(0,4);

  // ====== レイアウト条件（プレビューと同じ考え方） ======
  const holeCenter = 3.8, holeRadius = 1.5; // 穴径3mm
  const holeMargin = 0.8;
  const numberArea = 6;
  const rightMargin = 2;

  const holeRight = holeCenter + holeRadius;
  const textStart = holeRight + holeMargin;
  const textEnd   = 70 - numberArea - rightMargin;

  const mainMaxWidth = Math.max(5, textEnd - textStart);
  const mainCenterX  = textStart + mainMaxWidth / 2;
  const mainCenterY  = 8;        // プレビューのy=8（dominant-baseline: middle相当の中心）
  const numCX = 64;
  const numCY = 7.5;

  // ====== TTF側で「収まるまで縮小」 ======
  function fitSizeForWidth(text, startSize, minSize, maxWidth){
    let size = startSize;
    while (size > minSize) {
      const p = font.getPath(text, 0, 0, size);
      const b = p.getBoundingBox();
      const w = b.x2 - b.x1;
      if (w <= maxWidth) return size;
      size -= 0.2;
    }
    return minSize;
  }

  const mainSize = fitSizeForWidth(name, 6, 2, mainMaxWidth);
  const numSize  = 4; // 数字は固定（必要なら同様に縮小も可能）

  // ====== 文字を「中心に来るように」移動量を計算 ======
  function centerTransformFor(text, size, cx, cy){
    const p = font.getPath(text, 0, 0, size);
    const b = p.getBoundingBox();
    const w = b.x2 - b.x1;
    const h = b.y2 - b.y1;
    const tx = cx - (b.x1 + w/2);
    const ty = cy - (b.y1 + h/2);
    return { path: p, tx, ty };
  }

  const main = centerTransformFor(name, mainSize, mainCenterX, mainCenterY);
  const dMain = main.path.toPathData(3);

  // 数字（空なら出さない）
  let numPathBlock = "";
  if (num.length > 0) {
    const n = centerTransformFor(num, numSize, numCX, numCY);
    const dNum = n.path.toPathData(3);

    // ★重要：transform順序
    // SVGは右から適用なので「rotate(...) translate(...)」にすると translate が先に効く
    numPathBlock = `
  <path d="${escapeXml(dNum)}" fill="#000"
        transform="rotate(-90 ${numCX} ${numCY}) translate(${n.tx.toFixed(3)} ${n.ty.toFixed(3)})"/>`;
  }

  const inner = `
  <path d="${escapeXml(dMain)}" fill="#000"
        transform="translate(${main.tx.toFixed(3)} ${main.ty.toFixed(3)})"/>${numPathBlock}
  `;

  return makeSvgShell(inner);
}

    function postToGAS(gasUrlValue, payloadObj){
    return new Promise((resolve, reject) => {
      if (!gasUrlValue) return reject(new Error("GAS URLが未入力です"));

      const iframeName = "hk_gas_iframe_" + Date.now();
      const iframe = document.createElement("iframe");
      iframe.name = iframeName;
      iframe.style.display = "none";
      document.body.appendChild(iframe);

      const form = document.createElement("form");
      form.method = "POST";
      form.action = gasUrlValue;
      form.target = iframeName;

      const input = document.createElement("input");
      input.type = "hidden";
      input.name = "payload";
      input.value = JSON.stringify(payloadObj);

      form.appendChild(input);
      document.body.appendChild(form);

      // 送信
      form.submit();

      // 成功/失敗はレスポンスを読めないので、一定時間後に成功扱い（運用向け）
      setTimeout(() => {
        form.remove();
        iframe.remove();
        resolve({ ok:true });
      }, 1200);
    });
  }
  
  btnDone.addEventListener("click", () => {
    updatePreview();
    setLocked(true);
    doneSummary.innerHTML = makeSummary();
    resetStaffUI();                 // 表示のたびにスタッフ状態は初期化
    doneOverlay.style.display = "flex";
  });

  btnEdit.addEventListener("click", () => setLocked(false));

  closeDone.addEventListener("click", () => {
    doneOverlay.style.display = "none";
    resetStaffUI();                 // 閉じたら必ず合言葉やり直し
  });

  backToEdit.addEventListener("click", () => {
    doneOverlay.style.display = "none";
    setLocked(false);
    resetStaffUI();                 // 修正でも必ず合言葉やり直し
  });

  function clearForNext() {
    // スタッフが押す前提（解錠してるはず）
    nameInput.value = "はこだてみらい館";
    numInput.value = "1015";
    updatePreview();

    setLocked(false);
    setTicket(getNextTicket());     // 新番号
    doneOverlay.style.display = "none";
    resetStaffUI();
  }

  nextPerson.addEventListener("click", clearForNext);

  // ===== スタッフ扉 =====
  openStaffInOverlay.addEventListener("click", () => {
    staffGate.style.display = (staffGate.style.display === "none") ? "block" : "none";
  });

  const STAFF_PASSWORD = "miraikan";
  unlockStaff.addEventListener("click", () => {
    if ((staffPass.value || "").trim() === STAFF_PASSWORD) {
      staffControls.style.display = "block";
      staffMsg.textContent = "✅ スタッフ操作を表示しました";
      staffMsg.style.color = "#0a7";
      nextPerson.style.display = "block";  // ←解錠後のみ表示
    } else {
      staffControls.style.display = "none";
      staffMsg.textContent = "❌ 合言葉が違います";
      staffMsg.style.color = "#c33";
      nextPerson.style.display = "none";
    }
  });

  // ===== カウンターリセット =====
  resetCounterBtn.addEventListener("click", () => {
    const ok = confirm(`この端末（${devicePrefix}）の受付番号を0にリセットします。\nよろしいですか？`);
    if (!ok) return;
    store.setItem(counterKey(), "0");
    setTicket(getNextTicket());
    alert(`リセットしました。\n新しい受付番号：${ticketInput.value}`);
    doneSummary.innerHTML = makeSummary();
  });

  // ===== 出力/保存（次ステップ） =====
  function downloadText(filename, text){
    const blob = new Blob([text], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  btnDownload.addEventListener("click", async () => {
    try {
      staffMsg.textContent = "⏳ SVG生成中…";
      staffMsg.style.color = "#666";
      const svg = await buildOutlinedSvg();
      downloadText(makeFilename(), svg);
      staffMsg.textContent = "✅ ダウンロードしました";
      staffMsg.style.color = "#0a7";
    } catch(e){
      staffMsg.textContent = "❌ " + (e.message || String(e));
      staffMsg.style.color = "#c33";
    }
  });

  btnDrive.addEventListener("click", async () => {
    try {
      const url = (gasUrl.value || "").trim();
      staffMsg.textContent = "⏳ Driveへ送信中…";
      staffMsg.style.color = "#666";

      const svg = await buildOutlinedSvg();
      const payload = {
        apiKey: (apiKey.value || "").trim(),
        filename: makeFilename(),
        ticket: ticketInput.value || "",
        svg
      };

      await postToGAS(url, payload);

      staffMsg.textContent = "✅ Driveへ送信しました（保存完了まで数秒かかることがあります）";
      staffMsg.style.color = "#0a7";
    } catch(e){
      staffMsg.textContent = "❌ " + (e.message || String(e));
      staffMsg.style.color = "#c33";
    }
  });

})();
</script>

</body>
</html>
