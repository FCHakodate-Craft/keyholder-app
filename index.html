<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>アクリルルームキーホルダー</title>

<link rel="apple-touch-icon" href="icon.png">
  
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#000000">
  
<style>
body {
  font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif;
  margin: 30px;
}

h2 { margin-bottom: 20px; }

.container {
  display: flex;
  gap: 40px;
  flex-wrap: wrap;
  align-items: flex-start;
}

.preview-box {
  border: 1px solid #ccc;
  border-radius: 14px;
  padding: 20px;
}

svg { display: block; max-width: 100%; }

.control-panel { min-width: 280px; }

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}
</style>
</head>

<body>

<h2>アクリルルームキーホルダー
入力フォーム</h2>

<div class="container">

  <!-- プレビュー -->
  <div class="preview-box">
    
<svg viewBox="0 0 70 15" width="560">

  <!-- 外枠 -->
  <rect x="0.8" y="0.8"
        width="68.4" height="13.4"
        rx="2.2" ry="2.2"
        fill="none"
        stroke="#000"
        stroke-width="0.6"/>

  <!-- 穴（直径3mm） -->
  <circle cx="3.8" cy="7.5"
          r="1.5"
          fill="none"
          stroke="#000"
          stroke-width="0.6"/>

  <!-- 文字エリア可視化（確認用・後で消してOK） -->
  <!--
  <rect x="6.3" y="2" width="56" height="11"
        fill="none" stroke="red" stroke-width="0.3"/>
  -->

  <!-- メイン文字 -->
  <text id="mainText"
        x="34"
        y="8"
        text-anchor="middle"
        dominant-baseline="middle"
        font-size="6"
        fill="#000">
    はこだてみらい館
  </text>

  <!-- 数字 -->
  <g transform="rotate(-90 64 7.5)">
    <text id="numText"
          x="64"
          y="7.5"
          text-anchor="middle"
          dominant-baseline="middle"
          font-size="4"
          fill="#000">
      1015
    </text>
  </g>

</svg>
  </div>

  <!-- 入力フォーム -->
  <div class="control-panel">

    <label>メイン文字</label>
    <input id="nameInput" type="text" value="はこだてみらい館">

    <label>数字（最大4桁）</label>
    <input id="numInput" type="text" value="1015" maxlength="4">

    <label>フォント</label>
    <select id="fontSelect">
      <option value="sans-serif">Sans</option>
      <option value="serif">Serif</option>
      <option value="monospace">Monospace</option>
    </select>

  </div>

</div>

  <!-- お客さんには基本見せない：スタッフ用 -->
<div style="margin-top:14px;">
  <button id="openStaff"
    style="background:#fff;border:1px solid #ccc;color:#444;border-radius:10px;padding:10px;width:100%;cursor:pointer;">
    スタッフ用（出力・保存）
  </button>

  <details id="staffPanel" style="margin-top:10px; display:none;">
    <summary style="cursor:pointer; user-select:none;">スタッフ操作を表示</summary>

    <div style="margin-top:10px;">
      <label>合言葉</label>
      <input id="staffPass" type="password" placeholder="スタッフのみ" />
      <button id="unlockStaff" style="margin-top:8px;background:#000;color:#fff;border-radius:10px;padding:10px;width:100%;border:none;cursor:pointer;">
        開く
      </button>
      <div id="staffMsg" style="margin-top:8px;font-size:12px;color:#666;"></div>
    </div>

    <div id="staffControls" style="display:none; margin-top:14px;">
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button class="btn" id="btnDownload">SVGダウンロード（パス化）</button>
        <button class="btn2" id="btnDrive">Driveへ保存（パス化）</button>
      </div>

      <div style="margin-top:12px;font-size:12px;color:#666;line-height:1.5;">
        ※ここはスタッフ操作です（お客さまには見せない）<br>
        ※保存先や鍵はスタッフが設定
      </div>

      <label style="margin-top:12px;display:block;">Drive保存URL（GAS）</label>
      <input id="gasUrl" type="text" placeholder="https://script.google.com/macros/s/.../exec" />

      <label style="margin-top:10px;display:block;">保存キー（任意）</label>
      <input id="apiKey" type="text" placeholder="任意（GAS側と一致）" />
    </div>
  </details>
</div>

<script>
(() => {
  const nameInput = document.getElementById("nameInput");
  const numInput = document.getElementById("numInput");
  const fontSelect = document.getElementById("fontSelect");
  const mainText = document.getElementById("mainText");
  const numText = document.getElementById("numText");

  function normalizeNumber() {
    const clean = (numInput.value || "").replace(/[^0-9]/g, "").slice(0, 4);
    numInput.value = clean;
    return clean;
  }

  // 穴(直径3mm)と数字エリアを避けて、文字を中央配置＆自動縮小（iPad/Safari安定版）
  function fitMainText() {
    const holeCenter = 3.8;
    const holeRadius = 1.5;   // 直径3mm
    const holeMargin = 0.8;   // 穴の右の余白（狭めたいなら 0.5〜1.2 で調整）
    const numberArea = 6;     // 右側の数字エリア幅
    const rightMargin = 2;    // 右端余白

    const holeRight = holeCenter + holeRadius;
    const textStart = holeRight + holeMargin;
    const textEnd = 70 - numberArea - rightMargin;

    const maxWidth = Math.max(5, textEnd - textStart);
    const centerX = textStart + maxWidth / 2;

    // まずXを確定してから測る（ズレ防止）
    mainText.setAttribute("x", centerX);

    // 初期サイズ
    let fontSize = 6;
    mainText.setAttribute("font-size", fontSize);

    // 描画が落ち着いてから幅計測（Safari対策）
    requestAnimationFrame(() => {
      let bbox = mainText.getBBox();

      while (bbox.width > maxWidth && fontSize > 2) {
        fontSize -= 0.2;
        mainText.setAttribute("font-size", fontSize);
        bbox = mainText.getBBox();
      }
    });
  }

  function updatePreview() {
    mainText.textContent = nameInput.value || "";
    numText.textContent = normalizeNumber();

    const font = fontSelect.value;
    mainText.setAttribute("font-family", font);
    numText.setAttribute("font-family", font);

    fitMainText();
  }

  // リアルタイム反映
  nameInput.addEventListener("input", updatePreview);
  numInput.addEventListener("input", updatePreview);
  fontSelect.addEventListener("change", updatePreview);

  // 初期表示
  updatePreview();
})();

// ===== スタッフ用UI（隠しパネル） =====
const STAFF_PASSWORD = "miraikan"; // ←ここを任意に変更（例：当日共有の合言葉）

const openStaffBtn = document.getElementById("openStaff");
const staffPanel = document.getElementById("staffPanel");
const staffPass = document.getElementById("staffPass");
const unlockStaff = document.getElementById("unlockStaff");
const staffControls = document.getElementById("staffControls");
const staffMsg = document.getElementById("staffMsg");

// URLに ?staff=1 があるとスタッフ入口ボタンを表示（無いと入口すら出さない）
const isStaffHint = new URLSearchParams(location.search).get("staff") === "1";
if (isStaffHint) {
  staffPanel.style.display = "block";
  openStaffBtn.style.display = "block";
} else {
  // お客さん用：入口自体も隠す（スタッフはURL末尾に ?staff=1 を付けて入る）
  openStaffBtn.style.display = "none";
  staffPanel.style.display = "none";
}

openStaffBtn?.addEventListener("click", () => {
  staffPanel.open = true;
});

unlockStaff?.addEventListener("click", () => {
  if ((staffPass.value || "").trim() === STAFF_PASSWORD) {
    staffControls.style.display = "block";
    staffMsg.textContent = "✅ スタッフ操作を表示しました";
    staffMsg.style.color = "#0a7";
  } else {
    staffControls.style.display = "none";
    staffMsg.textContent = "❌ 合言葉が違います";
    staffMsg.style.color = "#c33";
  }
});
  
</script>

</body>
</html>
