<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>アクリルルームキーホルダー</title>

<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#000000">

<style>
  body { font-family: system-ui, -apple-system, "Noto Sans JP", sans-serif; margin: 24px; }
  h2 { margin: 0 0 16px; }
  .container { display:flex; gap:28px; flex-wrap:wrap; align-items:flex-start; }
  .preview-box { border:1px solid #ccc; border-radius:14px; padding:16px; }
  svg { display:block; max-width:100%; }
  .control { min-width:300px; }
  input, select, button { width:100%; padding:10px; margin-top:8px; font-size:16px; border-radius:10px; border:1px solid #ccc; }
  button { border:none; cursor:pointer; }
  .btnRow { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
  .btn { background:#000; color:#fff; }
  .btn2 { background:#fff; color:#000; border:1px solid #000; }
  .hint { font-size:12px; color:#555; line-height:1.5; margin-top:10px; }
  .ok { color:#0a7; }
  .ng { color:#c33; }

  /* ここは“表示用”のWebフォント（プレビュー） */
  @font-face {
    font-family: "F1_NotoSansJP";
    src: url("fonts/NotoSansJP-Regular.woff2") format("woff2");
    font-display: swap;
  }
  @font-face {
    font-family: "F2_NotoSerifJP";
    src: url("fonts/NotoSerifJP-Regular.woff2") format("woff2");
    font-display: swap;
  }
  /* ↑この形式で10個作る */
</style>

<!-- opentype.js（パス化用） -->
<script src="https://cdn.jsdelivr.net/npm/opentype.js@latest/dist/opentype.min.js"></script>
</head>

<body>
<h2>アクリルルームキーホルダー 入力フォーム</h2>

<div class="container">

  <div class="preview-box">
    <svg id="previewSvg" viewBox="0 0 70 15" width="560" aria-label="preview">
      <!-- 外枠 -->
      <rect x="0.8" y="0.8" width="68.4" height="13.4" rx="2.2" ry="2.2"
            fill="none" stroke="#000" stroke-width="0.6"/>

      <!-- 穴（直径3mm） -->
      <circle cx="3.8" cy="7.5" r="1.5"
              fill="none" stroke="#000" stroke-width="0.6"/>

      <!-- メイン文字（表示用。保存時はパス化する） -->
      <text id="mainText" x="34" y="8"
            text-anchor="middle" dominant-baseline="middle"
            font-size="6" fill="#000">はこだてみらい館</text>

      <!-- 数字（表示用。保存時はパス化する） -->
      <g transform="rotate(-90 64 7.5)">
        <text id="numText" x="64" y="7.5"
              text-anchor="middle" dominant-baseline="middle"
              font-size="4" fill="#000">1015</text>
      </g>
    </svg>

    <div id="status" class="hint">準備中…</div>
  </div>

  <div class="control">
    <label>メイン文字</label>
    <input id="nameInput" type="text" value="はこだてみらい館" />

    <label>数字（最大4桁）</label>
    <input id="numInput" type="text" value="1015" maxlength="4" inputmode="numeric" />

    <label>フォント（10種に増やせます）</label>
    <select id="fontSelect">
      <option value="F1_NotoSansJP">Noto Sans JP（例）</option>
      <option value="F2_NotoSerifJP">Noto Serif JP（例）</option>
      <!-- ここに10種並べる -->
    </select>

    <div class="btnRow">
      <button class="btn" id="btnDownload">SVGダウンロード（パス化）</button>
      <button class="btn2" id="btnDrive">Driveへ保存（パス化）</button>
    </div>

    <div class="hint">
      ・プレビューは軽量表示、保存時にパス化します<br>
      ・彫刻は黒塗り（#000）で出力します（K100相当運用）<br>
      ・Drive保存は次の「GAS URL」設定が必要です
    </div>

    <!-- Drive保存用の設定 -->
    <label style="margin-top:14px; display:block;">Drive保存URL（GAS Webアプリ）</label>
    <input id="gasUrl" type="text" placeholder="https://script.google.com/macros/s/....../exec" />

    <label style="margin-top:10px; display:block;">保存キー（任意：スパム防止）</label>
    <input id="apiKey" type="text" placeholder="任意（GAS側と一致させる）" />
  </div>

</div>

<script>
(() => {
  const nameInput = document.getElementById("nameInput");
  const numInput = document.getElementById("numInput");
  const fontSelect = document.getElementById("fontSelect");
  const mainText = document.getElementById("mainText");
  const numText = document.getElementById("numText");
  const status = document.getElementById("status");
  const btnDownload = document.getElementById("btnDownload");
  const btnDrive = document.getElementById("btnDrive");
  const gasUrlInput = document.getElementById("gasUrl");
  const apiKeyInput = document.getElementById("apiKey");

  // ★あなたのフォント10種をここで管理（パス化用に“ttf/otf”が必要）
  // ※パス化はwoff2だと扱いにくいことがあるので、パス化用は ttf/otf を推奨（fonts_otf/ に置く）
  const FONT_TABLE = {
    "F1_NotoSansJP": { display: "F1_NotoSansJP", pathFontUrl: "fonts_otf/NotoSansJP-Regular.otf" },
    "F2_NotoSerifJP": { display: "F2_NotoSerifJP", pathFontUrl: "fonts_otf/NotoSerifJP-Regular.otf" },
  };

  // フォントを一度読み込んでキャッシュ（パス化用）
  const fontCache = new Map();
  async function getPathFont(fontKey) {
    const info = FONT_TABLE[fontKey];
    if (!info) throw new Error("fontKey not found: " + fontKey);
    if (fontCache.has(fontKey)) return fontCache.get(fontKey);

    const res = await fetch(info.pathFontUrl);
    if (!res.ok) throw new Error("Font fetch failed: " + info.pathFontUrl);
    const buf = await res.arrayBuffer();
    const font = opentype.parse(buf);
    fontCache.set(fontKey, font);
    return font;
  }

  function normalizeNumber() {
    const clean = (numInput.value || "").replace(/[^0-9]/g, "").slice(0, 4);
    numInput.value = clean;
    return clean;
  }

  // 穴(直径3mm)と右側数字エリアを避けて、文字を中央配置＆自動縮小（Safari安定）
  function fitMainText() {
    const holeCenter = 3.8, holeRadius = 1.5;
    const holeMargin = 0.8;
    const numberArea = 6;
    const rightMargin = 2;

    const holeRight = holeCenter + holeRadius;
    const textStart = holeRight + holeMargin;
    const textEnd = 70 - numberArea - rightMargin;

    const maxWidth = Math.max(5, textEnd - textStart);
    const centerX = textStart + maxWidth / 2;

    mainText.setAttribute("x", centerX);

    let fontSize = 6;
    mainText.setAttribute("font-size", fontSize);

    requestAnimationFrame(() => {
      let bbox = mainText.getBBox();
      while (bbox.width > maxWidth && fontSize > 2) {
        fontSize -= 0.2;
        mainText.setAttribute("font-size", fontSize);
        bbox = mainText.getBBox();
      }
    });
  }

  function updatePreview() {
    mainText.textContent = nameInput.value || "";
    numText.textContent = normalizeNumber();

    const f = fontSelect.value;
    // プレビュー用フォント（@font-face側）
    mainText.setAttribute("font-family", FONT_TABLE[f]?.display || f);
    numText.setAttribute("font-family", FONT_TABLE[f]?.display || f);

    fitMainText();
    status.innerHTML = `<span class="ok">✅ 入力反映中</span>`;
  }

  // ===== パス化SVG生成 =====
  function escapeXml(s){
    return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&apos;");
  }

  function makeSvgShell(inner) {
    // レーザー用：黒塗り（#000）。穴と外枠は参考線にしたければstrokeだけでもOK
    return `<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="70mm" height="15mm" viewBox="0 0 70 15">
  <rect x="0.8" y="0.8" width="68.4" height="13.4" rx="2.2" ry="2.2" fill="none" stroke="#000" stroke-width="0.2"/>
  <circle cx="3.8" cy="7.5" r="1.5" fill="none" stroke="#000" stroke-width="0.2"/>
  ${inner}
</svg>`;
  }

  // メイン文字：横書き（自動縮小後のfont-sizeを使う）
  async function buildOutlinedSvg() {
    const fontKey = fontSelect.value;
    const font = await getPathFont(fontKey);

    const name = nameInput.value || "";
    const num = normalizeNumber();

    // メイン文字の現在サイズ/位置（fitMainText後の値を使う）
    const mainX = parseFloat(mainText.getAttribute("x")) || 34;
    const mainY = 8;
    const mainSize = parseFloat(mainText.getAttribute("font-size")) || 6;

    // opentypeはbaseline基準なので、Yは少し調整が必要（フォントごとに差が出る）
    // まずは経験則で mainY+ (size*0.35) あたりに寄せる
    const mainPath = font.getPath(name, 0, 0, mainSize);
    const mainBox = mainPath.getBoundingBox();
    const mainW = mainBox.x2 - mainBox.x1;
    const mainH = mainBox.y2 - mainBox.y1;

    // 中心合わせ：Xは mainX にセンター、Yは 8 に見た目合わせ
    const mainTx = mainX - (mainBox.x1 + mainW/2);
    const mainTy = (mainY + mainSize*0.35) - (mainBox.y1 + mainH/2);

    const mainD = mainPath.toPathData(3);

    // 数字：右端で-90°回転配置（見た目はプレビューと同じ）
    const numCenterX = 64;
    const numCenterY = 7.5;
    const numSize = 4;

    const numPath = font.getPath(num, 0, 0, numSize);
    const nb = numPath.getBoundingBox();
    const nW = nb.x2 - nb.x1;
    const nH = nb.y2 - nb.y1;

    const numTx = numCenterX - (nb.x1 + nW/2);
    const numTy = (numCenterY + numSize*0.35) - (nb.y1 + nH/2);
    const numD = numPath.toPathData(3);

    // 回転はSVGのtransformで（パス自体はそのまま）
    const inner = `
  <path d="${escapeXml(mainD)}" fill="#000" transform="translate(${mainTx.toFixed(3)} ${mainTy.toFixed(3)})"/>
  <path d="${escapeXml(numD)}" fill="#000"
        transform="translate(${numTx.toFixed(3)} ${numTy.toFixed(3)}) rotate(-90 ${numCenterX} ${numCenterY})"/>`;

    return makeSvgShell(inner);
  }

  function downloadText(filename, text) {
    const blob = new Blob([text], { type: "image/svg+xml;charset=utf-8" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(url);
  }

  // ===== Drive送信 =====
  async function saveToDrive(svgText) {
    const gasUrl = (gasUrlInput.value || "").trim();
    if (!gasUrl) throw new Error("GAS URLが未設定です");

    const payload = {
      apiKey: (apiKeyInput.value || "").trim(),
      filename: makeFilename(),
      svg: svgText
    };

    const res = await fetch(gasUrl, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload),
    });
    const json = await res.json().catch(() => ({}));
    if (!res.ok || json.ok !== true) {
      throw new Error(json.error || ("Drive保存に失敗しました（HTTP " + res.status + "）"));
    }
    return json;
  }

  function makeFilename() {
    const d = new Date();
    const pad = n => String(n).padStart(2,"0");
    const stamp = `${d.getFullYear()}${pad(d.getMonth()+1)}${pad(d.getDate())}_${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
    const name = (nameInput.value || "NONAME").replace(/[\\/:*?"<>|]/g,"").slice(0,20);
    const num = (numInput.value || "").slice(0,4);
    return `${stamp}_${name}_${num}.svg`;
  }

  // ===== イベント =====
  nameInput.addEventListener("input", updatePreview);
  numInput.addEventListener("input", updatePreview);
  fontSelect.addEventListener("change", async () => {
    updatePreview();
    // フォントのパス化用も先読み（体感速度UP）
    try { await getPathFont(fontSelect.value); } catch(e) {}
  });

  btnDownload.addEventListener("click", async () => {
    try {
      status.innerHTML = "⏳ SVG生成中…";
      const svg = await buildOutlinedSvg();
      downloadText(makeFilename(), svg);
      status.innerHTML = `<span class="ok">✅ ダウンロードしました</span>`;
    } catch (e) {
      status.innerHTML = `<span class="ng">❌ ${escapeXml(e.message || String(e))}</span>`;
    }
  });

  btnDrive.addEventListener("click", async () => {
    try {
      status.innerHTML = "⏳ Driveへ保存中…";
      const svg = await buildOutlinedSvg();
      const r = await saveToDrive(svg);
      status.innerHTML = `<span class="ok">✅ Drive保存OK：${escapeXml(r.fileName || "")}</span>`;
    } catch (e) {
      status.innerHTML = `<span class="ng">❌ ${escapeXml(e.message || String(e))}</span>`;
    }
  });

  // 初期：フォント読み込み（表示）＋プレビュー
  (async () => {
    try {
      updatePreview();
      status.innerHTML = `<span class="ok">✅ 準備OK</span>`;
      // 初回フォント先読み
      await getPathFont(fontSelect.value);
    } catch (e) {
      status.innerHTML = `<span class="ng">❌ 初期化に失敗：${escapeXml(e.message || String(e))}</span>`;
    }
  })();
})();
</script>
</body>
</html>
